<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Геопортал Казахстана</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        .info-panel { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-container { display: flex; flex: 1; gap: 15px; overflow: hidden; }
        
        #map { flex: 3; border-radius: 12px; border: 1px solid #ddd; height: 100%; }
        
        /* Сайдбар с группировкой */
        .sidebar { flex: 1; background: #fff; border-radius: 12px; border: 1px solid #ddd; overflow-y: auto; padding: 0; max-width: 320px; }
        .sidebar h3 { padding: 15px; margin: 0; background: #f8f9fa; border-bottom: 1px solid #eee; font-size: 18px; }
        
        .region-group { border-bottom: 1px solid #eee; }
        .region-header { background: #e9ecef; padding: 10px 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .region-header:hover { background: #dee2e6; }
        
        .district-item { padding: 8px 25px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f9f9f9; }
        .district-item:hover { background: #f0f7ff; color: #007bff; }
        
        /* Особенный стиль для городов */
        .city-item { font-weight: bold; color: #d63384; }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>Демографический мониторинг РК</h1>
    </div>
    
    <div class="main-container">
        <div class="sidebar">
            <h3>Регионы и Города</h3>
            <div id="items-container">Загрузка данных...</div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
