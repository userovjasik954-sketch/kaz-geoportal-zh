<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Геопортал Казахстана</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 700px; width: 100%; border: 2px solid #ccc; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .info-panel { margin-bottom: 15px; background: white; padding: 10px; border-radius: 8px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>Демографическая карта Казахстана (2025)</h1>
        <p>Интерактивные данные по районам. Источник: stat.gov.kz Бюро национальной статистики</p>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
